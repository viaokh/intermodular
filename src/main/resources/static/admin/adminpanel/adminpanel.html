<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="../../css/adminpanel.css">
    <script src="../../js/admin/adminpaneljs/adminpanel.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<header>

  <div class="header-logo">
    <img src="" alt="">
    <span>AuraSport</span>
  </div>


  <div class="header-actions">


    <button id="btn-idioma">ES</button>


    <div class="user-menu">
      <button id="btn-usuario">
        <img src="" alt="">
        <span>Admin</span>
      </button>

      <ul class="dropdown" role="menu">
        <li><a href="#">Mi perfil</a></li>
        <li><button type="button" id="logoutBtn">Cerrar sesión</button></li>
      </ul>
    </div>

  </div>

</header>

    <aside>
        <nav>
            <ul>
                <li>
                    <a href="#" data-section="dashboard">
                        <img src="imgs/logo.jpeg" alt="logo">
                        <span>Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="#" data-section="products">
                        <img src="imgs/list.svg" alt="products">
                        <span  data-inter="products">Products</span>
                    </a>
                </li>

                <li>
                    <a href="#" data-section="categories">
                        <img src="imgs/list.svg" alt="categories">
                        <span  data-inter="categories">Categories</span>
                    </a>
                </li>

                <li>
                    <a href="#" data-section="orders">
                        <img src="imgs/orders.svg" alt="orders">
                        <span  data-inter="orders">Orders</span>
                    </a>
                </li>
                
                <li>
                    <a href="#" data-section="users">
                        <img src="imgs/clients.svg" alt="users">
                        <span  data-inter="clients">Users</span>
                    </a>
                </li>

                <li>
                    <a href="#" data-section="coupons">
                        <img src="imgs/coupon.svg" alt="coupons">
                        <span  data-inter="coupons">Coupons</span>
                    </a>
                </li>

                <li>
                    <a href="#" data-section="settings">
                        <img src="imgs/settings.svg" alt="settings">
                        <span  data-inter="settings">Settings</span>
                    </a>
                </li>

            </ul>
        </nav>
    </aside>


    <main>

    <section id="dashboard">

        <h2>Dashboard</h2>

    </section>

    <section id="products">

        <h2>Products</h2>

    </section>

    <section id="categories">

        <h2>Categories</h2>

    </section>

    <section id="orders">

        <h2>Orders</h2>

    </section>


    <section id="users">
    <div class="section-header">
        <h2 data-inter="clients">Clients</h2>
    </div>

    <table class="tabla">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="clients-body">
        <tr>
			
        </tr>
        </tbody>
    </table>
    </section>

    <section id="coupons">

        <h2>Coupons</h2>

    </section>

    <section id="settings">
        
        <h2>Settings</h2>

    </section>

    </main>
</body>
</html>
